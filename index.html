<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maktab - Облачная Система</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .hidden { display: none; }
        .tab-view { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .post-card { border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.05); background: white; }
        .coin-badge { background: linear-gradient(90deg, #ffd700, #ffa500); color: white; padding: 2px 10px; border-radius: 20px; font-weight: bold; }
        .upload-area { border: 2px dashed #cbd5e1; padding: 20px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.3s; }
        .upload-area:hover { background: #f1f5f9; border-color: #3b82f6; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <div id="login-screen" class="min-h-screen flex items-center justify-center bg-blue-600 px-4">
        <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-black text-blue-700 italic">Maktab</h1>
                <p class="text-gray-400 mt-2">Введите свои данные для доступа</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="log-user" placeholder="Логин" class="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition">
                <input type="password" id="log-pass" placeholder="Пароль" class="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition">
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 shadow-lg transition transform active:scale-95 uppercase tracking-wider">Войти в систему</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen flex flex-col">
        <nav class="bg-white border-b p-4 flex justify-between items-center px-8 sticky top-0 z-50">
            <div class="text-2xl font-black text-blue-600 italic">eMaktab</div>
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-2 bg-yellow-50 px-4 py-2 rounded-2xl border border-yellow-200">
                    <i class="fas fa-coins text-yellow-500"></i>
                    <span id="user-coins" class="font-bold text-yellow-700">0</span>
                    <span class="text-xs font-bold text-yellow-600">MC</span>
                </div>
                <div class="text-right hidden sm:block">
                    <div id="user-display" class="font-bold text-gray-900 leading-none"></div>
                    <div id="role-display" class="text-[10px] text-blue-500 font-bold uppercase tracking-tighter"></div>
                </div>
                <button onclick="location.reload()" class="bg-gray-100 hover:bg-red-50 hover:text-red-600 p-2 px-4 rounded-xl text-sm font-bold transition flex items-center gap-2">
                    <i class="fas fa-sign-out-alt"></i> Выход
                </button>
            </div>
        </nav>

        <div class="container mx-auto flex flex-col md:flex-row p-6 gap-8">
            <aside class="w-full md:w-64 space-y-2">
                <button onclick="showTab('news')" class="w-full text-left p-4 bg-white hover:bg-blue-600 hover:text-white rounded-2xl shadow-sm transition-all font-bold flex items-center gap-3">
                    <i class="fas fa-home"></i> Новости
                </button>
                <button onclick="showTab('grades')" class="w-full text-left p-4 bg-white hover:bg-green-600 hover:text-white rounded-2xl shadow-sm transition-all font-bold flex items-center gap-3">
                    <i class="fas fa-chart-bar"></i> Оценки
                </button>
                <button onclick="showTab('shop')" class="w-full text-left p-4 bg-white hover:bg-yellow-500 hover:text-white rounded-2xl shadow-sm transition-all font-bold flex items-center gap-3">
                    <i class="fas fa-shopping-cart"></i> Магазин
                </button>
                <button onclick="showTab('profile')" class="w-full text-left p-4 bg-white hover:bg-purple-600 hover:text-white rounded-2xl shadow-sm transition-all font-bold flex items-center gap-3">
                    <i class="fas fa-user-circle"></i> Профиль
                </button>
                <button id="admin-only-btn" onclick="showTab('admin')" class="hidden w-full text-left p-4 bg-red-50 text-red-600 hover:bg-red-600 hover:text-white rounded-2xl shadow-sm transition-all font-bold flex items-center gap-3 border border-red-100">
                    <i class="fas fa-tools"></i> Панель Админа
                </button>
            </aside>

            <main class="flex-1">
                <div id="tab-news" class="tab-view space-y-8"></div>

                <div id="tab-grades" class="tab-view hidden">
                    <div class="bg-white p-8 rounded-3xl shadow-sm">
                        <h2 class="text-2xl font-black mb-8 border-b pb-4">Электронный журнал</h2>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left border-collapse">
                                <thead>
                                    <tr class="text-gray-400 text-[11px] uppercase tracking-widest border-b">
                                        <th class="pb-4 font-bold">Предмет</th>
                                        <th class="pb-4 font-bold">Оценка</th>
                                        <th class="pb-4 font-bold">Учитель</th>
                                        <th class="pb-4 font-bold text-right">Дата</th>
                                    </tr>
                                </thead>
                                <tbody id="grades-body" class="divide-y"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div id="tab-shop" class="tab-view hidden">
                    <h2 class="text-2xl font-black mb-6">Maktab Shop</h2>
                    <div id="shop-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
                </div>

                <div id="tab-profile" class="tab-view hidden max-w-md mx-auto">
                    <div class="bg-white p-10 rounded-3xl shadow-sm border border-gray-100 text-center">
                        <h2 class="text-2xl font-black mb-8 uppercase tracking-tight">Мои настройки</h2>
                        <div class="space-y-6">
                            <input type="text" id="prof-nick" class="w-full p-4 bg-gray-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-purple-500 transition mt-1">
                            <input type="password" id="prof-pass" class="w-full p-4 bg-gray-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-purple-500 transition mt-1">
                            <button onclick="saveProfile()" class="w-full bg-purple-600 text-white py-4 rounded-2xl font-black hover:bg-purple-700 shadow-xl transition transform active:scale-95">СОХРАНИТЬ</button>
                        </div>
                    </div>
                </div>

                <div id="tab-admin" class="tab-view hidden space-y-8">
                    <div class="bg-white p-8 rounded-3xl shadow-sm border-l-8 border-red-500">
                        <h3 class="font-black text-xl mb-6 flex items-center gap-2"><i class="fas fa-plus-circle"></i> Создать новый пост</h3>
                        <div class="space-y-4">
                            <input id="p-title" type="text" placeholder="Заголовок" class="w-full p-4 bg-gray-50 border-none rounded-2xl">
                            <textarea id="p-text" placeholder="Текст новости..." class="w-full p-4 bg-gray-50 border-none rounded-2xl" rows="3"></textarea>
                            
                            <label class="upload-area block">
                                <i class="fas fa-image text-3xl text-gray-400 mb-2"></i>
                                <p class="text-gray-500 text-sm">Нажмите, чтобы выбрать фото с ПК/Телефона</p>
                                <input type="file" id="p-file" class="hidden" accept="image/*">
                                <p id="file-name" class="text-blue-500 mt-2 font-bold"></p>
                            </label>

                            <button id="publish-btn" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black hover:bg-blue-700 transition shadow-lg">ОПУБЛИКОВАТЬ</button>
                        </div>
                    </div>

                    <div class="bg-white p-8 rounded-3xl shadow-sm border-l-8 border-green-500">
                        <h3 class="font-black text-xl mb-6 flex items-center gap-2"><i class="fas fa-pen-alt"></i> Выставить оценку</h3>
                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                            <select id="g-student-select" class="p-4 bg-gray-50 border-none rounded-2xl font-bold text-blue-600"></select>
                            <input id="g-subj" type="text" placeholder="Предмет" class="p-4 bg-gray-50 border-none rounded-2xl">
                            <input id="g-val" type="number" placeholder="Баллы" class="p-4 bg-gray-50 border-none rounded-2xl">
                        </div>
                        <button id="grade-btn" class="mt-4 bg-green-600 text-white px-10 py-4 rounded-2xl font-black hover:bg-green-700 transition shadow-lg">ПОСТАВИТЬ</button>
                    </div>

                    <div class="bg-white p-8 rounded-3xl shadow-sm border-l-8 border-yellow-500">
                        <h3 class="font-black text-xl mb-6 flex items-center gap-2"><i class="fas fa-cart-plus"></i> Добавить товар</h3>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <input id="item-name" type="text" placeholder="Название товара" class="p-4 bg-gray-50 border-none rounded-2xl">
                            <input id="item-price" type="number" placeholder="Цена (Коины)" class="p-4 bg-gray-50 border-none rounded-2xl">
                        </div>
                        <label class="upload-area block mt-4">
                            <i class="fas fa-camera text-2xl text-gray-400"></i>
                            <p class="text-sm">Выбрать фото товара</p>
                            <input type="file" id="item-file" class="hidden" accept="image/*">
                            <p id="item-file-name" class="text-yellow-600 mt-1 font-bold"></p>
                        </label>
                        <button id="add-item-btn" class="mt-4 bg-yellow-500 text-white px-10 py-4 rounded-2xl font-black hover:bg-yellow-600 shadow-lg transition">ДОБАВИТЬ В МАГАЗИН</button>
                    </div>

                    <div class="bg-white p-8 rounded-3xl shadow-sm border-l-8 border-purple-500">
                        <h3 class="font-black text-xl mb-6">📦 Новые заказы</h3>
                        <div id="orders-container" class="space-y-4"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAr4H-obZsEVVR2NOS0Dn700tzq2AnquKY",
            authDomain: "emaktab-it.firebaseapp.com",
            databaseURL: "https://emaktab-it-default-rtdb.firebaseio.com",
            projectId: "emaktab-it",
            storageBucket: "emaktab-it.firebasestorage.app",
            messagingSenderId: "707385373999",
            appId: "1:707385373999:web:a45f21fd84db617b7a9dda",
            measurementId: "G-XWJPLBPNL2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const storage = getStorage(app);

        let users = [
            {login: 'admin', pass: 'per14sik', role: 'admin', nick: 'Главный Админ'},
            {login: 'student2', pass: '123', role: 'student', nick: 'Руфина'},
            {login: 'student', pass: '123', role: 'student', nick: 'Ахад'},
            {login: 'student3', pass: '123', role: 'student', nick: 'Эльдар'},
            {login: 'student4', pass: '123', role: 'student', nick: 'Лиля'},
        ];

        window.currentUser = null;
        let userTotalCoins = 0;

        // Показ имени выбранного файла
        document.getElementById('p-file').onchange = e => document.getElementById('file-name').innerText = e.target.files[0].name;
        document.getElementById('item-file').onchange = e => document.getElementById('item-file-name').innerText = e.target.files[0].name;

        window.handleLogin = () => {
            const u = document.getElementById('log-user').value;
            const p = document.getElementById('log-pass').value;
            const found = users.find(user => user.login === u && user.pass === p);
            if(found) { window.currentUser = found; initApp(); } 
            else { alert("Неверный логин!"); }
        };

        function initApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('user-display').innerText = window.currentUser.nick;
            document.getElementById('role-display').innerText = window.currentUser.role;
            if(window.currentUser.role === 'admin') {
                document.getElementById('admin-only-btn').classList.remove('hidden');
                document.getElementById('g-student-select').innerHTML = users.filter(u => u.role === 'student').map(u => `<option value="${u.login}">${u.nick}</option>`).join('');
            }
            renderNews(); renderGrades(); renderShop(); renderOrders();
        }

        window.showTab = (tabName) => {
            document.querySelectorAll('.tab-view').forEach(v => v.classList.add('hidden'));
            document.getElementById('tab-' + tabName).classList.remove('hidden');
        };

        // ЗАГРУЗКА ФАЙЛА И ПУБЛИКАЦИЯ ПОСТА
        document.getElementById('publish-btn').onclick = async () => {
            const title = document.getElementById('p-title').value;
            const content = document.getElementById('p-text').value;
            const file = document.getElementById('p-file').files[0];
            
            if(!title || !content) return alert("Заполни текст!");
            
            let imgUrl = "";
            if(file) {
                document.getElementById('publish-btn').innerText = "Загрузка фото...";
                const storageRef = sRef(storage, 'news/' + Date.now() + "_" + file.name);
                await uploadBytes(storageRef, file);
                imgUrl = await getDownloadURL(storageRef);
            }

            push(ref(db, 'posts'), {
                title, content, img: imgUrl,
                author: window.currentUser.nick,
                date: new Date().toLocaleString('ru-RU')
            }).then(() => {
                alert("Пост опубликован!");
                location.reload();
            });
        };

        // ДОБАВЛЕНИЕ ТОВАРА С ФОТО
        document.getElementById('add-item-btn').onclick = async () => {
            const name = document.getElementById('item-name').value;
            const price = document.getElementById('item-price').value;
            const file = document.getElementById('item-file').files[0];

            if(!name || !price) return alert("Заполни данные!");

            let imgUrl = "";
            if(file) {
                const storageRef = sRef(storage, 'shop/' + Date.now() + "_" + file.name);
                await uploadBytes(storageRef, file);
                imgUrl = await getDownloadURL(storageRef);
            }

            push(ref(db, 'shop'), { name, price, img: imgUrl });
            alert("Товар добавлен!");
            location.reload();
        };

        // --- ОСТАЛЬНЫЕ ФУНКЦИИ (БЕЗ ИЗМЕНЕНИЙ) ---
        document.getElementById('grade-btn').onclick = () => {
            const student = document.getElementById('g-student-select').value;
            const subject = document.getElementById('g-subj').value;
            const val = parseInt(document.getElementById('g-val').value);
            push(ref(db, 'grades'), { student, subject, val, teacher: window.currentUser.nick, date: new Date().toLocaleDateString('ru-RU') })
            .then(() => alert("Готово!"));
        };

        function renderGrades() {
            onValue(ref(db, 'grades'), (snap) => {
                const data = snap.val();
                let html = ""; userTotalCoins = 0;
                for(let id in data) {
                    const g = data[id];
                    if(g.student === window.currentUser.login) userTotalCoins += parseInt(g.val);
                    if(window.currentUser.role === 'student' && g.student !== window.currentUser.login) continue;
                    html += `<tr class="border-b"><td class="p-4">${g.subject}</td><td class="p-4"><span class="bg-blue-600 text-white px-3 py-1 rounded-lg">${g.val}</span></td><td class="p-4 text-sm">${g.teacher}</td><td class="p-4 text-right text-gray-400">${g.date}</td></tr>`;
                }
                onValue(ref(db, 'orders'), (s) => {
                    const orders = s.val();
                    for(let i in orders) if(orders[i].studentLogin === window.currentUser.login) userTotalCoins -= parseInt(orders[i].price);
                    document.getElementById('user-coins').innerText = userTotalCoins;
                    document.getElementById('grades-body').innerHTML = html;
                });
            });
        }

        function renderShop() {
            onValue(ref(db, 'shop'), (snap) => {
                const data = snap.val(); let html = "";
                for(let id in data) {
                    const item = data[id];
                    html += `<div class="bg-white p-4 rounded-3xl shadow-sm border flex flex-col items-center">
                        <img src="${item.img || 'https://via.placeholder.com/150'}" class="w-full h-32 object-contain mb-4">
                        <h4 class="font-black">${item.name}</h4>
                        <div class="coin-badge my-2">${item.price} MC</div>
                        <button onclick="buyItem('${id}', '${item.name}', ${item.price})" class="w-full bg-blue-600 text-white py-2 rounded-xl">Купить</button>
                    </div>`;
                }
                document.getElementById('shop-container').innerHTML = html;
            });
        }

        window.buyItem = (id, name, price) => {
            if(userTotalCoins < price) return alert("Мало коинов!");
            push(ref(db, 'orders'), { itemName: name, price, studentName: window.currentUser.nick, studentLogin: window.currentUser.login, date: new Date().toLocaleString() })
            .then(() => alert("Заказано!"));
        };

        function renderOrders() {
            onValue(ref(db, 'orders'), (snap) => {
                const data = snap.val(); let html = "";
                for(let id in data) {
                    const o = data[id];
                    html = `<div class="bg-purple-50 p-3 rounded-xl border flex justify-between"><span><b>${o.studentName}</b> купил ${o.itemName}</span><span class="text-xs text-gray-400">${o.date}</span></div>` + html;
                }
                document.getElementById('orders-container').innerHTML = html;
            });
        }

        function renderNews() {
            onValue(ref(db, 'posts'), (snap) => {
                const data = snap.val(); let html = "";
                for(let id in data) {
                    const p = data[id];
                    html = `<div class="post-card">${p.img ? `<img src="${p.img}" class="w-full h-72 object-cover">` : ''}<div class="p-8"><h3 class="text-2xl font-black">${p.title}</h3><p class="text-gray-500 my-4">${p.content}</p><div class="flex justify-between text-xs text-gray-400 border-t pt-4 uppercase"><span>${p.author}</span><span>${p.date}</span></div></div></div>` + html;
                }
                document.getElementById('tab-news').innerHTML = html;
            });
        }
    </script>
</body>
</html>
